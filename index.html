;display:none;align-items:center;gap:8px;border:1px solid var(--glass-border)}.sync-status.show{display:flex}.sync-status.syncing{color:var(--primary)}.sync-status.synced{color:#22c55e}.sync-status.error{color:#ef4444}</style></head><body><div class="desktop-block"><h1>📱 Mobile Only</h1><p>Acesse via smartphone</p></div><div class="screenshot-overlay" id="screenshotOverlay"></div><div class="print-warning" id="printWarning">⚠️ Print detectado!</div><div class="sync-status" id="syncStatus"><span id="syncIcon">🔄</span><span id="syncText">Sincronizando...</span></div><div class="loader" id="loader"><div class="loader-content"><div class="loader-spinner"></div><p>Easy Support</p></div></div><div class="lightbox" id="lightbox"><button class="lightbox-close" onclick="closeLightbox()">✕</button><img id="lightboxImg" src="" alt="Foto"></div><div class="modal-overlay" id="passwordModal"><div class="password-modal"><h2>🔐 Admin</h2><input type="password" class="password-input" id="passwordInput" placeholder="••••" maxlength="4"><div><button class="modal-btn cancel" onclick="closePasswordModal()">Cancelar</button><button class="modal-btn confirm" onclick="checkPassword()">Entrar</button></div></div></div><div class="access-denied" id="accessDenied"><h3>⚠️ Ei! Não pode clicar aí!</h3><p>Somente admin.</p></div><div class="app-container"><div class="greeting-banner" id="greetingBanner"><div class="greeting-text" id="greetingText">Olá!</div><div class="greeting-subtext" id="greetingSubtext">Bem-vindo ao Easy Support</div></div><header><div class="logo">Easy Support</div><div class="header-actions"><button class="update-btn" id="updateBtn" onclick="checkForUpdates()">🔄</button><button class="admin-btn" onclick="openPasswordModal()">+</button></div></header><div class="search-container"><input type="text" class="search-box" id="searchBox" placeholder="Pesquisar..." onkeyup="searchContent()"><button class="search-btn" onclick="searchContent()">🔍</button></div><div class="admin-panel" id="adminPanel"><h2>🎛️ Painel Admin</h2><form id="contentForm" onsubmit="addContent(event)"><div class="form-group"><label>Título</label><input type="text" id="contentTitle" required></div><div class="form-group"><label>Descrição</label><textarea id="contentDesc" required></textarea></div><div class="form-group"><label>Data</label><input type="date" id="contentDate" required></div><div class="form-group"><label>Categoria</label><select id="contentCategory"><option value="geral">Geral</option><option value="escola">Escola</option><option value="aviso">Aviso</option><option value="evento">Evento</option></select></div><div class="form-group"><label>Fotos</label><div class="file-input-wrapper"><input type="file" id="contentImages" accept="image/*" multiple onchange="previewImages()"><label for="contentImages" class="file-input-label">📷 Adicionar fotos (máx 5)</label></div><div class="preview-container" id="previewContainer"></div></div><div class="form-group"><label>Tags</label><input type="text" id="contentTags" placeholder="ex: prova, importante"></div><div class="checkbox-group"><input type="checkbox" id="contentPinned"><label for="contentPinned">📌 Fixar no topo</label></div><button type="submit" class="submit-btn">Publicar</button></form></div><div class="trash-section" id="trashSection"><h3>🗑️ Lixeira</h3><div id="trashList"></div><button class="empty-trash-btn" onclick="emptyTrash()">Esvaziar Lixeira</button></div><div class="schedule-editor" id="scheduleEditor"><h3>✏️ Editar Horários</h3><div class="schedule-form"><input type="time" id="scheduleTime" required><input type="text" id="scheduleSubject" placeholder="Matéria" required><input type="text" id="scheduleRoom" placeholder="Sala" required><button class="add-schedule-btn" onclick="addScheduleItem()">+</button></div><div class="current-schedule-list" id="currentScheduleList"></div></div><div class="schedule-section"><div class="schedule-header"><div class="schedule-title">📚 Horários de Aula</div><button class="edit-schedule-btn" id="editScheduleBtn" onclick="toggleScheduleEditor()">✏️ Editar</button></div><div class="day-tabs" id="dayTabs"><button class="day-tab active" onclick="changeDay(0)">Dom</button><button class="day-tab" onclick="changeDay(1)">Seg</button><button class="day-tab" onclick="changeDay(2)">Ter</button><button class="day-tab" onclick="changeDay(3)">Qua</button><button class="day-tab" onclick="changeDay(4)">Qui</button><button class="day-tab" onclick="changeDay(5)">Sex</button><button class="day-tab" onclick="changeDay(6)">Sáb</button></div><div id="scheduleContainer"></div></div><div class="content-grid" id="contentGrid"></div></div><div class="bot-area"><div class="bot-wrapper" id="botWrapper"><div class="bot-speech-bubble" id="botBubble"><div id="botMessage">Oi! Sou o Bot!</div><div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div><div class="bot-character" id="botCharacter" onclick="botInteract()"><div class="bot-badge" id="botBadge">!</div><div class="bot-head"><div class="bot-eye left"></div><div class="bot-eye right"></div></div><div class="bot-body"></div><div class="bot-arm left"></div><div class="bot-arm right"></div><div class="bot-leg left"></div><div class="bot-leg right"></div></div></div></div><script>const CONFIG={password:'2736',maxImages:5,botMoveInterval:0,syncInterval:30000,lastSyncKey:'easysupport_last_sync',globalDataKey:'easysupport_global_data'};let state={contents:[],tempImages:[],isAdmin:false,currentDay:new Date().getDay(),editingScheduleDay:1,hasUpdate:false};let SCHEDULES={};let trash=[];let globalData={contents:[],schedules:{},lastUpdate:0,updateId:''};function loadGlobalData(){try{const saved=localStorage.getItem(CONFIG.globalDataKey);if(saved){globalData=JSON.parse(saved);state.contents=globalData.contents||[];SCHEDULES=globalData.schedules||{};trash=globalData.trash||[];if(!state.contents.length){initDefaultData()}renderContents();renderSchedule(state.currentDay);checkForUpdates(false)}else{initDefaultData()}}catch(e){initDefaultData()}}function initDefaultData(){state.contents=[{id:Date.now(),title:"Bem-vindo ao Easy Support!",desc:"Sistema sincronizado! 🔄 Clique no botão verde para atualizar. Fotos em tamanho real! 📸",date:new Date().toISOString().split('T')[0],category:"geral",tags:["boas-vindas","sincronizado"],pinned:true,images:[],createdAt:new Date().toISOString()}];SCHEDULES={0:[],1:[{time:"07:30",subject:"Matemática",room:"Sala 101"},{time:"09:00",subject:"Português",room:"Sala 102"}],2:[{time:"07:30",subject:"Química",room:"Lab 2"}],3:[{time:"07:30",subject:"Física",room:"Lab 1"}],4:[{time:"07:30",subject:"História",room:"Sala 103"}],5:[{time:"07:30",subject:"Biologia",room:"Lab 3"}],6:[]};trash=[];saveGlobalData()}function saveGlobalData(){globalData={contents:state.contents,schedules:SCHEDULES,trash:trash,lastUpdate:Date.now(),updateId:generateId()};try{localStorage.setItem(CONFIG.globalDataKey,JSON.stringify(globalData));localStorage.setItem(CONFIG.lastSyncKey,Date.now().toString());showSyncStatus('Sincronizado!','✅',2000)}catch(e){showSyncStatus('Erro ao salvar','❌',3000)}}function generateId(){return Math.random().toString(36).substring(2,15)+Math.random().toString(36).substring(2,15)}function showSyncStatus(text,icon,duration=3000){const status=document.getElementById('syncStatus');const iconEl=document.getElementById('syncIcon');const textEl=document.getElementById('syncText');iconEl.textContent=icon;textEl.textContent=text;status.classList.add('show');if(duration>0){setTimeout(()=>status.classList.remove('show'),duration)}}function checkForUpdates(showNotification=true){const lastSync=parseInt(localStorage.getItem(CONFIG.lastSyncKey)||'0');const saved=localStorage.getItem(CONFIG.globalDataKey);if(saved){try{const data=JSON.parse(saved);if(data.lastUpdate>globalData.lastUpdate||data.updateId!==globalData.updateId){globalData=data;state.contents=data.contents||state.contents;SCHEDULES=data.schedules||SCHEDULES;trash=data.trash||trash;renderContents();renderSchedule(state.currentDay);renderTrash();if(showNotification){showSyncStatus('Atualizado!','🔄',3000);botSpeak('🔄 Site atualizado com novas informações!',4000);document.getElementById('updateBtn').classList.remove('has-update')}return true}}catch(e){}}if(showNotification){showSyncStatus('Você está atualizado','✅',2000)}return false}function autoSync(){setInterval(()=>{const hasNew=checkForUpdates(false);if(hasNew){document.getElementById('updateBtn').classList.add('has-update');state.hasUpdate=true;botSpeak('🔄 Há uma atualização disponível! Clique no 🔄',6000)}},CONFIG.syncInterval)}function initSecurity(){document.addEventListener('keydown',(e)=>{if((e.ctrlKey||e.metaKey)&&(e.key==='p'||e.key==='P')){e.preventDefault();showPrintWarning();return false}});document.addEventListener('visibilitychange',()=>{if(document.hidden){document.getElementById('screenshotOverlay').style.display='block';setTimeout(()=>document.getElementById('screenshotOverlay').style.display='none',2000)}});document.addEventListener('selectstart',(e)=>{if(e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA')e.preventDefault()});document.addEventListener('contextmenu',(e)=>{e.preventDefault();return false})}function showPrintWarning(){const w=document.getElementById('printWarning');w.classList.add('show');setTimeout(()=>w.classList.remove('show'),3000)}function previewImages(){const input=document.getElementById('contentImages');const container=document.getElementById('previewContainer');state.tempImages=[];container.innerHTML='';if(input.files.length>CONFIG.maxImages){alert(`Máximo ${CONFIG.maxImages} fotos!`);input.value='';return}Array.from(input.files).forEach(file=>{const reader=new FileReader();reader.onload=(e)=>{state.tempImages.push(e.target.result);const img=document.createElement('img');img.src=e.target.result;img.className='preview-item';container.appendChild(img)};reader.readAsDataURL(file)})}function updateGreeting(){const hour=new Date().getHours();const dayNames=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];const today=dayNames[new Date().getDay()];let greeting="Olá!";let icon="👋";if(hour>=5&&hour<12){greeting="Bom dia!";icon="☀️"}else if(hour>=12&&hour<18){greeting="Boa tarde!";icon="🌤️"}else if(hour>=18&&hour<22){greeting="Boa noite!";icon="🌙"}else{greeting="Olá, coruja!";icon="🦉"}document.getElementById('greetingText').textContent=`${icon} ${greeting}`;document.getElementById('greetingSubtext').textContent=`Hoje é ${today}. Toque no Bot para ajuda!`}function initBot(){updateBotPosition();checkBotNews();setTimeout(()=>{botSpeak(getWelcomeMessage())},1500)}function getWelcomeMessage(){const hour=new Date().getHours();let greeting="Olá";if(hour<12)greeting="Bom dia";else if(hour<18)greeting="Boa tarde";else greeting="Boa noite";const dayNames=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];const today=dayNames[new Date().getDay()];const pinned=state.contents.filter(c=>c.pinned).length;let msg=`${greeting}! Hoje é ${today}. Sou o Bot! `;if(pinned>0){msg+=`Temos ${pinned} novidade${pinned>1?'s':''} fixada${pinned>1?'s':''}! 📌`}else{msg+="Toque em mim se precisar de ajuda! 🤖"}return msg}function updateBotPosition(){const wrapper=document.getElementById('botWrapper');wrapper.style.left='50%';wrapper.style.transform='translateX(-50%)';wrapper.style.right='auto'}function botSpeak(msg,duration=5000){const bubble=document.getElementById('botBubble');const msgDiv=document.getElementById('botMessage');const typing=document.getElementById('typingIndicator');const screenWidth=window.innerWidth;bubble.style.left='50%';bubble.style.transform='translateX(-50%) scale(0)';bubble.classList.add('show');msgDiv.style.opacity='0.3';typing.classList.add('show');setTimeout(()=>{typing.classList.remove('show');msgDiv.style.opacity='1';msgDiv.textContent=msg;bubble.style.transform='translateX(-50%) scale(1)';setTimeout(()=>{bubble.classList.remove('show');bubble.style.transform='translateX(-50%) scale(0)'},duration)},600)}function botInteract(){const char=document.getElementById('botCharacter');char.style.transform='scale(0.9) rotate(5deg)';setTimeout(()=>char.style.transform='',200);const msgs=["Oi! Sou o Bot! 🤖","Posso ajudar? 🔍","Use a busca acima! 📱","Toque nos dias para ver horários! 📚","Verifique os cards fixados! 📌","Clique no 🔄 para atualizar!","Hoje é "+['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date().getDay()]+"! 📅"];const randomMsg=msgs[Math.floor(Math.random()*msgs.length)];botSpeak(randomMsg,4000)}function checkBotNews(){const pinned=state.contents.filter(c=>c.pinned).length;const badge=document.getElementById('botBadge');if(pinned>0){badge.textContent=pinned>9?'9+':pinned;badge.classList.add('show')}else{badge.classList.remove('show')}}function openPasswordModal(){document.getElementById('passwordModal').classList.add('active');document.getElementById('passwordInput').value='';setTimeout(()=>document.getElementById('passwordInput').focus(),100)}function closePasswordModal(){document.getElementById('passwordModal').classList.remove('active')}function checkPassword(){const input=document.getElementById('passwordInput').value;if(input===CONFIG.password){closePasswordModal();state.isAdmin=true;document.getElementById('adminPanel').classList.add('active');document.getElementById('scheduleEditor').classList.add('active');document.getElementById('editScheduleBtn').classList.add('active');renderScheduleEditor();renderTrash();botSpeak("🔓 Modo Admin ativado! Agora você pode editar tudo!",4000)}else{closePasswordModal();document.getElementById('accessDenied').classList.add('show');botSpeak("⚠️ Senha incorreta! Somente admin.",3000);setTimeout(()=>document.getElementById('accessDenied').classList.remove('show'),2500)}}function toggleScheduleEditor(){const editor=document.getElementById('scheduleEditor');editor.classList.toggle('active');if(editor.classList.contains('active'))renderScheduleEditor()}function renderScheduleEditor(){const list=document.getElementById('currentScheduleList');const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];let html=`<div style="margin-bottom:10px"><strong>Editando: ${dayNames[state.editingScheduleDay]}</strong></div><div style="display:flex;gap:5px;margin-bottom:15px;flex-wrap:wrap">`;for(let i=0;i<7;i++){html+=`<button onclick="setEditingDay(${i})" style="padding:5px 10px;border:none;border-radius:10px;background:${state.editingScheduleDay===i?'linear-gradient(135deg,var(--primary),var(--accent))':'rgba(255,255,255,0.1)'};color:#fff;font-size:0.8rem">${dayNames[i]}</button>`}html+=`</div>`;const daySchedule=SCHEDULES[state.editingScheduleDay]||[];if(daySchedule.length===0){html+=`<div style="color:rgba(255,255,255,0.5);font-size:0.9rem;text-align:center;padding:20px">Sem aulas neste dia. Adicione uma!</div>`}else{daySchedule.forEach((item,index)=>{html+=`<div class="schedule-item"><div class="schedule-item-info"><div class="schedule-item-time">🕐 ${item.time}</div><div class="schedule-item-subject">${item.subject}</div><div class="schedule-item-room">📍 ${item.room}</div></div><button class="delete-schedule-btn" onclick="deleteScheduleItem(${index})">✕</button></div>`})}list.innerHTML=html}function setEditingDay(day){state.editingScheduleDay=day;renderScheduleEditor()}function addScheduleItem(){const time=document.getElementById('scheduleTime').value;const subject=document.getElementById('scheduleSubject').value;const room=document.getElementById('scheduleRoom').value;if(!time||!subject||!room){alert('Preencha horário, matéria e sala!');return}if(!SCHEDULES[state.editingScheduleDay])SCHEDULES[state.editingScheduleDay]=[];SCHEDULES[state.editingScheduleDay].push({time,subject,room});SCHEDULES[state.editingScheduleDay].sort((a,b)=>a.time.localeCompare(b.time));saveGlobalData();renderScheduleEditor();if(state.currentDay===state.editingScheduleDay)renderSchedule(state.currentDay);botSpeak(`✅ Aula de ${subject} adicionada!`,3000);document.getElementById('scheduleTime').value='';document.getElementById('scheduleSubject').value='';document.getElementById('scheduleRoom').value=''}function deleteScheduleItem(index){if(confirm('Remover esta aula?')){SCHEDULES[state.editingScheduleDay].splice(index,1);saveGlobalData();renderScheduleEditor();if(state.currentDay===state.editingScheduleDay)renderSchedule(state.currentDay)}}function deleteContent(id){if(!confirm('Mover este item para a lixeira?'))return;const index=state.contents.findIndex(c=>c.id===id);if(index>-1){const item=state.contents[index];item.deletedAt=new Date().toISOString();trash.unshift(item);state.contents.splice(index,1);saveGlobalData();renderContents();renderTrash();botSpeak("🗑️ Movido para lixeira! Você pode restaurar.",3000)}}function restoreFromTrash(index){const item=trash[index];delete item.deletedAt;state.contents.unshift(item);trash.splice(index,1);saveGlobalData();renderContents();renderTrash();botSpeak("♻️ Item restaurado!",3000)}function permanentDelete(index){if(!confirm('Excluir permanentemente? Não pode desfazer!'))return;trash.splice(index,1);saveGlobalData();renderTrash();botSpeak("🗑️ Excluído permanentemente!",3000)}function emptyTrash(){if(!confirm('Esvaziar lixeira? Todos os itens serão perdidos!'))return;trash=[];saveGlobalData();renderTrash();botSpeak("🗑️ Lixeira vazia!",3000)}function renderTrash(){const list=document.getElementById('trashList');if(trash.length===0){list.innerHTML='<div style="color:rgba(255,255,255,0.5);text-align:center;padding:20px">Lixeira vazia</div>';return}list.innerHTML=trash.map((item,index)=>`<div class="trash-item"><div class="trash-item-title">${item.title}</div><div class="trash-item-date">Excluído: ${new Date(item.deletedAt).toLocaleDateString('pt-BR')}</div><div class="trash-actions"><button class="restore-btn" onclick="restoreFromTrash(${index})">♻️ Restaurar</button><button class="permanent-delete-btn" onclick="permanentDelete(${index})">🗑️ Excluir</button></div></div>`).join('')}function addContent(e){e.preventDefault();const newContent={id:Date.now(),title:document.getElementById('contentTitle').value,desc:document.getElementById('contentDesc').value,date:document.getElementById('contentDate').value,category:document.getElementById('contentCategory').value,tags:document.getElementById('contentTags').value.split(',').map(t=>t.trim()).filter(t=>t),pinned:document.getElementById('contentPinned').checked,images:[...state.tempImages],createdAt:new Date().toISOString()};state.contents.unshift(newContent);saveGlobalData();renderContents();document.getElementById('contentForm').reset();document.getElementById('previewContainer').innerHTML='';state.tempImages=[];document.getElementById('contentDate').valueAsDate=new Date();botSpeak(`✅ "${newContent.title}" publicado! ${newContent.images.length>0?newContent.images.length+' fotos! 📷':''}`,5000);checkBotNews()}function renderContents(searchTerm=''){const grid=document.getElementById('contentGrid');let filtered=state.contents;if(searchTerm){const term=searchTerm.toLowerCase();filtered=state.contents.filter(c=>c.title.toLowerCase().includes(term)||c.desc.toLowerCase().includes(term)||c.date.includes(term)||c.tags.some(t=>t.toLowerCase().includes(term)))}const pinned=filtered.filter(c=>c.pinned);const normal=filtered.filter(c=>!c.pinned);const sorted=[...pinned,...normal];if(sorted.length===0){grid.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum conteúdo ainda</p></div>`;return}grid.innerHTML=sorted.map(c=>`<div class="content-card"><div class="card-header"><div style="flex:1"><div class="card-title">${c.title}</div><div class="card-date">📅 ${new Date(c.date).toLocaleDateString('pt-BR')} • ${c.category.toUpperCase()}</div></div>${c.pinned?'<div class="pin-badge">📌 FIXADO</div>':''}<button class="delete-card-btn" onclick="deleteContent(${c.id})" title="Mover para lixeira">🗑️</button></div><div class="card-content">${c.desc}</div>${c.images.length>0?`<div class="card-images">${c.images.map((img,i)=>`<img src="${img}" class="card-image" onclick="openLightbox('${img}')" alt="Foto ${i+1}" loading="lazy">`).join('')}</div>`:''}<div class="card-tags">${c.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div></div>`).join('')}function searchContent(){const term=document.getElementById('searchBox').value;renderContents(term);if(term){const count=state.contents.filter(c=>c.title.toLowerCase().includes(term.toLowerCase())||c.desc.toLowerCase().includes(term.toLowerCase())).length;botSpeak(count>0?`🔍 ${count} resultado${count>1?'s':''} para "${term}"`:`😕 Nada encontrado para "${term}"`,4000)}}function changeDay(dayIndex){state.currentDay=dayIndex;document.querySelectorAll('.day-tab').forEach((tab,idx)=>tab.classList.toggle('active',idx===dayIndex));renderSchedule(dayIndex);const dayNames=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];const today=new Date().getDay();if(dayIndex===today){const hasClasses=SCHEDULES[dayIndex]&&SCHEDULES[dayIndex].length>0;botSpeak(`Hoje é ${dayNames[dayIndex]}! ${hasClasses?'Você tem aulas! Não esqueça! 📚':'Dia de descanso! Aproveite! 🎉'}`,5000)}}function renderSchedule(dayIndex){const container=document.getElementById('scheduleContainer');const dayNames=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];const schedule=SCHEDULES[dayIndex]||[];if(schedule.length===0){container.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🏖️</div><p>Sem aulas na ${dayNames[dayIndex]}</p><small style="color:rgba(255,255,255,0.4)">Dia de descanso!</small></div>`}else{container.innerHTML=schedule.map(s=>`<div class="time-slot"><div class="time">${s.time}</div><div class="subject">${s.subject}</div><div class="room">${s.room}</div></div>`).join('')}}function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('active')}function closeLightbox(){document.getElementById('lightbox').classList.remove('active')}document.addEventListener('DOMContentLoaded',()=>{updateGreeting();loadGlobalData();initSecurity();initBot();autoSync();renderSchedule(state.currentDay);renderContents();renderTrash();setTimeout(()=>document.getElementById('loader').classList.add('hidden'),1500)});document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closePasswordModal();closeLightbox();document.getElementById('accessDenied').classList.remove('show');document.getElementById('scheduleEditor').classList.remove('active')}});window.addEventListener('resize',updateBotPosition);
</script></body></html>
