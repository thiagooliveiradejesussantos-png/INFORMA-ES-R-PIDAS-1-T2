Content(event)"><div class="form-group"><label>Título</label><input type="text" id="contentTitle" required></div><div class="form-group"><label>Descrição</label><textarea id="contentDesc" required></textarea></div><div class="form-group"><label>Data</label><input type="date" id="contentDate" required></div><div class="form-group"><label>Categoria</label><select id="contentCategory"><option value="geral">Geral</option><option value="escola">Escola</option><option value="aviso">Aviso</option><option value="evento">Evento</option></select></div><div class="form-group"><label>Fotos</label><div class="file-input-wrapper"><input type="file" id="contentImages" accept="image/*" multiple onchange="previewImages()"><label for="contentImages" class="file-input-label">📷 Adicionar fotos</label></div><div class="preview-container" id="previewContainer"></div></div><div class="form-group"><label>Tags</label><input type="text" id="contentTags" placeholder="ex: prova, importante"></div><div class="checkbox-group"><input type="checkbox" id="contentPinned"><label for="contentPinned">📌 Fixar</label></div><button type="submit" class="submit-btn">Publicar</button></form></div><div class="trash-section hidden" id="trashSection"><h3>🗑️ Lixeira</h3><div id="trashList"></div><button class="empty-trash-btn" onclick="emptyTrash()">Esvaziar Lixeira</button></div><div class="schedule-editor hidden" id="scheduleEditor"><h3>✏️ Editar Horários</h3><div class="schedule-form"><input type="time" id="scheduleTime" required><input type="text" id="scheduleSubject" placeholder="Matéria" required><input type="text" id="scheduleRoom" placeholder="Sala" required><button class="add-schedule-btn" onclick="addScheduleItem()">+</button></div><div class="current-schedule-list" id="currentScheduleList"></div></div><div class="schedule-section"><div class="schedule-header"><div class="schedule-title">📚 Horários</div><button class="edit-schedule-btn hidden" id="editScheduleBtn" onclick="toggleScheduleEditor()">✏️ Editar</button></div><div class="day-tabs" id="dayTabs"><button class="day-tab active" onclick="changeDay(0)">Dom</button><button class="day-tab" onclick="changeDay(1)">Seg</button><button class="day-tab" onclick="changeDay(2)">Ter</button><button class="day-tab" onclick="changeDay(3)">Qua</button><button class="day-tab" onclick="changeDay(4)">Qui</button><button class="day-tab" onclick="changeDay(5)">Sex</button><button class="day-tab" onclick="changeDay(6)">Sáb</button></div><div id="scheduleContainer"></div></div><div class="content-grid" id="contentGrid"></div></div><div class="bot-area"><div class="bot-wrapper pos-center" id="botWrapper"><div class="bot-speech-bubble" id="botBubble"><div id="botMessage">Oi! Sou o Bot!</div><div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div><div class="bot-character" id="botCharacter"><div class="bot-badge" id="botBadge">!</div><div class="bot-head"><div class="bot-eye left"></div><div class="bot-eye right"></div></div><div class="bot-body"></div><div class="bot-arm left"></div><div class="bot-arm right"></div><div class="bot-leg left"></div><div class="bot-leg right"></div></div></div></div><script>const CONFIG={password:'2736',maxImages:5};let state={contents:[],tempImages:[],isAdmin:false,currentDay:new Date().getDay(),botHasSpoken:false};let SCHEDULES={};let trash=[];function loadSchedules(){const saved=localStorage.getItem('easysupport_schedules');if(saved){SCHEDULES=JSON.parse(saved)}else{SCHEDULES={0:[],1:[{time:"07:30",subject:"Matemática",room:"Sala 101"},{time:"09:00",subject:"Português",room:"Sala 102"},{time:"10:30",subject:"História",room:"Sala 103"}],2:[{time:"07:30",subject:"Química",room:"Lab 2"},{time:"09:00",subject:"Biologia",room:"Lab 3"},{time:"10:30",subject:"Geografia",room:"Sala 201"}],3:[{time:"07:30",subject:"Física",room:"Lab 1"},{time:"09:00",subject:"Matemática",room:"Sala 101"},{time:"10:30",subject:"Ed. Física",room:"Ginásio"}],4:[{time:"07:30",subject:"História",room:"Sala 103"},{time:"09:00",subject:"Português",room:"Sala 102"},{time:"10:30",subject:"Química",room:"Lab 2"}],5:[{time:"07:30",subject:"Biologia",room:"Lab 3"},{time:"09:00",subject:"Geografia",room:"Sala 201"},{time:"10:30",subject:"Inglês",room:"Sala 202"}],6:[]};saveSchedules()}}function saveSchedules(){localStorage.setItem('easysupport_schedules',JSON.stringify(SCHEDULES))}function loadTrash(){const saved=localStorage.getItem('easysupport_trash');if(saved){trash=JSON.parse(saved)}else{trash=[]}}function saveTrash(){localStorage.setItem('easysupport_trash',JSON.stringify(trash))}function initData(){const saved=localStorage.getItem('easysupport_data');if(saved){state.contents=JSON.parse(saved)}else{state.contents=[{id:1,title:"Bem-vindo ao Easy Support!",desc:"Fotos grandes visíveis! Admin pode deletar posts! 📸",date:new Date().toISOString().split('T')[0],category:"geral",tags:["boas-vindas"],pinned:true,images:[],createdAt:new Date().toISOString()}];saveData()}const dateInput=document.getElementById('contentDate');if(dateInput)dateInput.valueAsDate=new Date()}function saveData(){localStorage.setItem('easysupport_data',JSON.stringify(state.contents))}function initSecurity(){document.addEventListener('keydown',(e)=>{if((e.ctrlKey||e.metaKey)&&(e.key==='p'||e.key==='P')){e.preventDefault();showPrintWarning();return false}});document.addEventListener('visibilitychange',()=>{if(document.hidden){document.getElementById('screenshotOverlay').style.display='block';setTimeout(()=>{document.getElementById('screenshotOverlay').style.display='none'},2000)}});const logs=JSON.parse(localStorage.getItem('easysupport_logs')||'[]');logs.push({time:new Date().toISOString(),ua:navigator.userAgent.substring(0,50),screen:`${screen.width}x${screen.height}`});localStorage.setItem('easysupport_logs',JSON.stringify(logs.slice(-20)))}function showPrintWarning(){const w=document.getElementById('printWarning');w.classList.add('show');setTimeout(()=>w.classList.remove('show'),3000)}function logFail(pass){const f=JSON.parse(localStorage.getItem('easysupport_fails')||'[]');f.push({time:new Date().toISOString(),tried:pass});localStorage.setItem('easysupport_fails',JSON.stringify(f.slice(-10)))}function previewImages(){const input=document.getElementById('contentImages');const container=document.getElementById('previewContainer');state.tempImages=[];container.innerHTML='';if(input.files.length>CONFIG.maxImages){alert(`Máximo ${CONFIG.maxImages} fotos!`);input.value='';return}Array.from(input.files).forEach(file=>{const reader=new FileReader();reader.onload=(e)=>{state.tempImages.push(e.target.result);const img=document.createElement('img');img.src=e.target.result;img.className='preview-item';container.appendChild(img)};reader.readAsDataURL(file)})}function initBot(){updateBotPosition();setInterval(checkBotNews,8000);setTimeout(()=>{if(!state.botHasSpoken){botAutoSpeak()}},1500)}function getAutoMessage(){const hour=new Date().getHours();const dayNames=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];const today=new Date().getDay();const dayName=dayNames[today];let greeting="Olá";if(hour<12)greeting="Bom dia";else if(hour<18)greeting="Boa tarde";else greeting="Boa noite";const pinned=state.contents.filter(c=>c.pinned).length;let msg=`${greeting}! Hoje é ${dayName}! `;if(pinned>0){msg+=`Temos ${pinned} novidade${pinned>1?'s':''} fixada${pinned>1?'s':''}! 📌`}else{msg+="Navegue pelo site! 📱"}return msg}function botAutoSpeak(){state.botHasSpoken=true;const msg=getAutoMessage();botSpeak(msg,6000)}function updateBotPosition(){const wrapper=document.getElementById('botWrapper');wrapper.className='bot-wrapper pos-center'}function botSpeak(msg,duration=5000){const bubble=document.getElementById('botBubble');const msgDiv=document.getElementById('botMessage');const typing=document.getElementById('typingIndicator');bubble.style.left='50%';bubble.style.transform='translateX(-50%) scale(0)';bubble.classList.add('show');msgDiv.style.opacity='0.3';typing.classList.add('show');setTimeout(()=>{typing.classList.remove('show');msgDiv.style.opacity='1';msgDiv.textContent=msg;bubble.style.transform='translateX(-50%) scale(1)';setTimeout(()=>{bubble.classList.remove('show')},duration)},600)}function checkBotNews(){const pinned=state.contents.filter(c=>c.pinned).length;const badge=document.getElementById('botBadge');if(pinned>0){badge.textContent=pinned>9?'9+':pinned;badge.classList.add('show')}else{badge.classList.remove('show')}}function openPasswordModal(){document.getElementById('passwordModal').classList.add('active');document.getElementById('passwordInput').value='';setTimeout(()=>document.getElementById('passwordInput').focus(),100)}function closePasswordModal(){document.getElementById('passwordModal').classList.remove('active')}function checkPassword(){const input=document.getElementById('passwordInput').value;if(input===CONFIG.password){closePasswordModal();state.isAdmin=true;document.getElementById('adminPanel').classList.remove('hidden');document.getElementById('scheduleEditor').classList.remove('hidden');document.getElementById('trashSection').classList.remove('hidden');document.getElementById('editScheduleBtn').classList.remove('hidden');document.querySelectorAll('.delete-card-btn').forEach(btn=>btn.classList.remove('hidden'));renderScheduleEditor();renderTrash();botSpeak("🔓 Admin ativado! Pode deletar posts!",4000)}else{closePasswordModal();logFail(input);showAccessDenied()}}function showAccessDenied(){const modal=document.getElementById('accessDenied');modal.classList.add('show');setTimeout(()=>modal.classList.remove('show'),2500)}function toggleScheduleEditor(){const editor=document.getElementById('scheduleEditor');editor.classList.toggle('hidden');if(!editor.classList.contains('hidden')){renderScheduleEditor()}}function renderScheduleEditor(){const list=document.getElementById('currentScheduleList');const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];let html=`<div style="margin-bottom:10px"><strong>Editando: ${dayNames[state.currentDay]}</strong></div>`;html+=`<div style="display:flex;gap:5px;margin-bottom:15px;flex-wrap:wrap">`;for(let i=1;i<=5;i++){html+=`<button onclick="setEditingDay(${i})" style="padding:5px 10px;border:none;border-radius:10px;background:${state.currentDay===i?'linear-gradient(135deg,var(--primary),var(--accent))':'rgba(255,255,255,0.1)'};color:#fff;font-size:0.8rem">${dayNames[i]}</button>`}html+=`</div>`;const daySchedule=SCHEDULES[state.currentDay]||[];if(daySchedule.length===0){html+=`<div style="color:rgba(255,255,255,0.5);font-size:0.9rem">Sem aulas</div>`}else{daySchedule.forEach((item,index)=>{html+=`<div class="schedule-item"><div class="schedule-item-info"><div class="schedule-item-time">${item.time}</div><div class="schedule-item-subject">${item.subject}</div><div class="schedule-item-room">${item.room}</div></div><button class="delete-schedule-btn" onclick="deleteScheduleItem(${index})">✕</button></div>`})}list.innerHTML=html}function setEditingDay(day){state.currentDay=day;renderScheduleEditor();renderSchedule(day)}function addScheduleItem(){const time=document.getElementById('scheduleTime').value;const subject=document.getElementById('scheduleSubject').value;const room=document.getElementById('scheduleRoom').value;if(!time||!subject||!room){alert('Preencha todos!');return}if(!SCHEDULES[state.currentDay]){SCHEDULES[state.currentDay]=[]}SCHEDULES[state.currentDay].push({time,subject,room});SCHEDULES[state.currentDay].sort((a,b)=>a.time.localeCompare(b.time));saveSchedules();renderScheduleEditor();renderSchedule(state.currentDay);botSpeak("✅ Aula adicionada!",3000);document.getElementById('scheduleTime').value='';document.getElementById('scheduleSubject').value='';document.getElementById('scheduleRoom').value=''}function deleteScheduleItem(index){if(confirm('Remover aula?')){SCHEDULES[state.currentDay].splice(index,1);saveSchedules();renderScheduleEditor();renderSchedule(state.currentDay)}}function deleteContent(id){if(!confirm('Mover para lixeira?'))return;const index=state.contents.findIndex(c=>c.id===id);if(index>-1){const item=state.contents[index];item.deletedAt=new Date().toISOString();trash.push(item);state.contents.splice(index,1);saveData();saveTrash();renderContents();renderTrash();botSpeak("🗑️ Post na lixeira!",3000)}}function restoreFromTrash(index){const item=trash[index];delete item.deletedAt;state.contents.push(item);trash.splice(index,1);saveData();saveTrash();renderContents();renderTrash();botSpeak("♻️ Restaurado!",3000)}function permanentDelete(index){if(!confirm('Excluir para sempre?'))return;trash.splice(index,1);saveTrash();renderTrash()}function emptyTrash(){if(!confirm('Esvaziar lixeira?'))return;trash=[];saveTrash();renderTrash();botSpeak("🗑️ Lixeira vazia!",3000)}function renderTrash(){const list=document.getElementById('trashList');if(trash.length===0){list.innerHTML='<div style="color:rgba(255,255,255,0.5);text-align:center;padding:20px">Vazia</div>';return}list.innerHTML=trash.map((item,index)=>`<div class="trash-item"><div class="trash-item-title">${item.title}</div><div class="trash-item-date">${new Date(item.deletedAt).toLocaleDateString('pt-BR')}</div><div class="trash-actions"><button class="restore-btn" onclick="restoreFromTrash(${index})">♻️ Restaurar</button><button class="permanent-delete-btn" onclick="permanentDelete(${index})">🗑️ Excluir</button></div></div>`).join('')}function addContent(e){e.preventDefault();const newContent={id:Date.now(),title:document.getElementById('contentTitle').value,desc:document.getElementById('contentDesc').value,date:document.getElementById('contentDate').value,category:document.getElementById('contentCategory').value,tags:document.getElementById('contentTags').value.split(',').map(t=>t.trim()).filter(t=>t),pinned:document.getElementById('contentPinned').checked,images:[...state.tempImages],createdAt:new Date().toISOString()};state.contents.unshift(newContent);saveData();renderContents();document.getElementById('contentForm').reset();document.getElementById('previewContainer').innerHTML='';state.tempImages=[];document.getElementById('contentDate').valueAsDate=new Date();botSpeak(`✅ "${newContent.title}" publicado!`,5000);checkBotNews()}function renderContents(searchTerm=''){const grid=document.getElementById('contentGrid');let filtered=state.contents;if(searchTerm){const term=searchTerm.toLowerCase();filtered=state.contents.filter(c=>c.title.toLowerCase().includes(term)||c.desc.toLowerCase().includes(term)||c.date.includes(term)||c.tags.some(t=>t.toLowerCase().includes(term)))}const pinned=filtered.filter(c=>c.pinned);const normal=filtered.filter(c=>!c.pinned);const sorted=[...pinned,...normal];if(sorted.length===0){grid.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🔍</div><p>Nada encontrado</p></div>`;return}grid.innerHTML=sorted.map(c=>`<div class="content-card"><div class="card-header"><div><div class="card-title">${c.title}</div><div class="card-date">📅 ${new Date(c.date).toLocaleDateString('pt-BR')} • ${c.category.toUpperCase()}</div></div><button class="delete-card-btn ${state.isAdmin?'':'hidden'}" onclick="deleteContent(${c.id})">🗑️</button>${c.pinned?`<div class="pin-badge ${state.isAdmin?'':'no-delete'}">📌 FIXADO</div>`:''}</div><div class="card-content">${c.desc}</div>${c.images.length>0?`<div class="card-images">${c.images.map((img,i)=>`<img src="${img}" class="card-image" onclick="openLightbox('${img}')" alt="Foto ${i+1}">`).join('')}</div>`:''}<div class="card-tags">${c.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div></div>`).join('')}function searchContent(){const term=document.getElementById('searchBox').value;renderContents(term)}function changeDay(dayIndex){state.currentDay=dayIndex;document.querySelectorAll('.day-tab').forEach((tab,idx)=>{tab.classList.toggle('active',idx===dayIndex)});renderSchedule(dayIndex)}function renderSchedule(dayIndex){const container=document.getElementById('scheduleContainer');const dayNames=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];const schedule=SCHEDULES[dayIndex]||[];if(schedule.length===0){container.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🏖️</div><p>Sem aulas na ${dayNames[dayIndex]}</p></div>`}else{container.innerHTML=schedule.map(s=>`<div class="time-slot"><div class="time">${s.time}</div><div class="subject">${s.subject}</div><div class="room">${s.room}</div></div>`).join('')}}function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('active')}function closeLightbox(){document.getElementById('lightbox').classList.remove('active')}document.addEventListener('DOMContentLoaded',()=>{loadSchedules();loadTrash();initData();initSecurity();initBot();renderSchedule(state.currentDay);renderContents();setTimeout(()=>{document.getElementById('loader').classList.add('hidden')},1200)});document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closePasswordModal();closeLightbox();document.getElementById('accessDenied').classList.remove('show')}if(e.key==='Enter'&&document.getElementById('passwordModal').classList.contains('active')){checkPassword()}});document.getElementById('passwordModal')?.addEventListener('click',(e)=>{if(e.target===e.currentTarget)closePasswordModal()});
</script></body></html>
